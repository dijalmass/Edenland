# ----------------------------------------------------- 
# Edenland Hyprland Configuration
# Motor de janelas oficial do Edenland Shell
# ----------------------------------------------------- 

# --- Monitores ---
monitor=,preferred,auto,1

# --- Autostart ---
# Inicia o shell principal do Edenland
exec-once = edenland

# Inicia o gerenciador de papel de parede
exec-once = hyprpaper --config /etc/edenland/hyprpaper.conf

# Inicia o agente de autenticação polkit (essencial para apps pedirem senha)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- Variáveis de Ambiente ---
env = XDG_CURRENT_DESKTOP,Edenland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Edenland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland

# --- Aparência & Input ---
input {
    kb_layout = br
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    layout = dwindle # Ou 'master' para algo mais focado em comandos
}

decoration {
    rounding = 0
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    drop_shadow = false
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Regras de Janela ---
# Garante que o shell do Edenland não tenha bordas e seja tratado como painel se necessário
windowrulev2 = noborder, class:(edenland)
windowrulev2 = float, class:(edenland)

# --- Atalhos (Binds) ---
$mainMod = SUPER

# Ações do Sistema
bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, M, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Foco de Janela
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Mover Janela para Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
