[[permission]]
identifier = "display-commands"
description = "Permissions for display arrangement, brightness, color management and workspaces commands"
commands.allow = [
  "get_brightness",
  "set_brightness",
  "get_monitors",
  "get_workspaces",
  "get_active_workspace",
  "get_workspace_clients",
  "switch_workspace",
  "focus_window",
  "apply_monitor_config",
  "set_workspace_monitor"
]
